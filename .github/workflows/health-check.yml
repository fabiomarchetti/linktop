name: Supabase Health Check

# Esegue ogni 5 giorni per mantenere attivo il database Supabase (free tier)
# Supabase mette in pausa i progetti free dopo 7 giorni di inattività

on:
  schedule:
    # Ogni 5 giorni alle 8:00 UTC
    - cron: '0 8 */5 * *'

  # Permette esecuzione manuale dalla tab Actions
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Database
        run: |
          echo "Esecuzione health check su linktop.vercel.app..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://linktop.vercel.app/api/test-db)

          if [ "$RESPONSE" -eq 200 ]; then
            echo "Database attivo! Status: $RESPONSE"
          else
            echo "Attenzione! Status: $RESPONSE"
            exit 1
          fi

      - name: Log Result
        run: |
          echo "Health check completato: $(date)"
