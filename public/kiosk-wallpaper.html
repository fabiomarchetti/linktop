<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Monitoraggio Salute</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #0f766e 0%, #0d9488 50%, #14b8a6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.08);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
  }

  .icon-container {
    position: relative;
    z-index: 1;
    margin-bottom: 40px;
  }

  .heart-circle {
    width: 200px;
    height: 200px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.2);
  }

  .heart-svg {
    width: 120px;
    height: 120px;
  }

  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .title {
    position: relative;
    z-index: 1;
    color: white;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 12px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.15);
  }

  .subtitle {
    position: relative;
    z-index: 1;
    color: rgba(255, 255, 255, 0.6);
    font-size: 20px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 60px;
  }

  .tap-hint {
    position: relative;
    z-index: 1;
    color: rgba(255, 255, 255, 0.4);
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeInOut 3s ease-in-out infinite;
  }

  @keyframes fadeInOut {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  .line {
    position: relative;
    z-index: 1;
    width: 60px;
    height: 2px;
    background: rgba(255, 255, 255, 0.2);
    margin-bottom: 30px;
  }

  .brand {
    position: absolute;
    bottom: 40px;
    color: rgba(255, 255, 255, 0.25);
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="icon-container pulse">
    <div class="heart-circle">
      <svg class="heart-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 100L20 60C4 44 4 20 20 4C36 -12 60 -12 76 4L60 20L44 4C28 -12 4 -12 -12 4" fill="none"/>
        <path d="M60 95L25 58C10 43 10 22 25 7C40 -8 58 -8 68 7L60 18L52 7C42 -8 24 -8 9 7" fill="none"/>
        <path d="M60 90L28 56C14 42 14 24 28 10C42 -4 58 -4 66 10L60 20L54 10C46 -4 32 -4 18 10" fill="none"/>
        <path d="M60 85L15 40C0 25 0 5 15 -10" fill="none"/>
        <path d="M60 100L20 60C4 44 4 20 20 4C36 -12 52 -8 60 4C68 -8 84 -12 100 4C116 20 116 44 100 60L60 100Z" fill="white"/>
        <path d="M30 65H45L52 50L60 75L68 50L75 65H90" stroke="rgba(13,148,136,0.5)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
  </div>

  <div class="title">Monitoraggio Salute</div>
  <div class="subtitle">Il tuo benessere, sempre sotto controllo</div>

  <div class="line"></div>
  <div class="tap-hint">Tocca per iniziare</div>

  <div class="brand">LINKTOP</div>
</body>
</html>
